  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nk-1:#0E1116;\n    --ink-2:#1B2028;\n    --ink-3:#3A4150;\n    --ink-4:#6B7382;\n    --ink-5:#9AA2AF;\n    --line:#E4E6EB;\n    --line-2:#EEF0F3;\n    --paper:#FBFBF9;     /* warm off-white */\n    --paper-2:#F4F4F1;\n    --card:#FFFFFF;\n    --accent:#185FA5;\n    --accent-soft:#E7EFF8;\n    --green:#1D9E75;\n    --amber:#BA7517;\n    --rose:#D4537E;\n    --orange:#D85A30;\n    --shadow: 0 1px 0 rgba(14,17,22,0.04), 0 8px 24px -12px rgba(14,17,22,0.10);\n    --radius:14px;\n    --radius-sm:10px;\n  }\n\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink-1);}\n  body{\n    font-family:'Inter', system-ui, sans-serif;\n    font-feature-settings:\"ss01\",\"cv11\",\"tnum\";\n    -webkit-font-smoothing:antialiased;\n    text-rendering:optimizeLegibility;\n    line-height:1.5;\n  }\n\n  .display{font-family:'Inter Tight', system-ui, sans-serif; letter-spacing:-0.02em; font-weight:600;}\n  .serif{font-family:'Instrument Serif', Georgia, serif; font-weight:400; letter-spacing:-0.01em;}\n  .mono{font-family:'JetBrains Mono', ui-monospace, monospace; font-feature-settings:\"tnum\"; letter-spacing:-0.01em;}\n\n  /* ───────── shell ───────── */\n  .page{\n    max-width:1280px;\n    margin:0 auto;\n    padding:32px 28px 96px;\n  }\n\n  /* ───────── masthead ───────── */\n  .masthead{\n    display:grid;\n    grid-template-columns: 1fr auto;\n    align-items:end;\n    gap:24px;\n    padding-bottom:20px;\n    border-bottom:1px solid var(--line);\n    margin-bottom:28px;\n  }\n  .eyebrow{\n    font-size:11px;\n    font-weight:500;\n    letter-spacing:0.18em;\n    text-transform:uppercase;\n    color:var(--ink-4);\n    margin:0 0 14px;\n    display:flex;\n    align-items:center;\n    gap:10px;\n  }\n  .eyebrow::before{\n    content:\"\";\n    width:18px; height:1px; background:var(--ink-3);\n  }\n  h1.title{\n    font-family:'Inter Tight', sans-serif;\n    font-weight:600;\n    font-size:clamp(32px, 5vw, 52px);\n    line-height:1.02;\n    letter-spacing:-0.035em;\n    margin:0 0 6px;\n    color:var(--ink-1);\n  }\n  h1.title em{\n    font-family:'Instrument Serif', serif;\n    font-style:italic;\n    font-weight:400;\n    color:var(--ink-3);\n    letter-spacing:-0.01em;\n  }\n  .subtitle{\n    color:var(--ink-3);\n    font-size:15px;\n    margin:0;\n    max-width:62ch;\n  }\n  .meta{\n    display:flex;\n    flex-direction:column;\n    align-items:flex-end;\n    gap:6px;\n    font-size:12px;\n    color:var(--ink-4);\n    white-space:nowrap;\n  }\n  .meta .pill{\n    display:inline-flex;\n    align-items:center;\n    gap:8px;\n    padding:6px 12px;\n    background:var(--card);\n    border:1px solid var(--line);\n    border-radius:999px;\n    color:var(--ink-2);\n    font-weight:500;\n    font-size:12px;\n  }\n  .meta .pill .dot{\n    width:6px; height:6px; border-radius:50%;\n    background:var(--green);\n    box-shadow:0 0 0 3px rgba(29,158,117,0.18);\n  }\n\n  /* ───────── KPIs ───────── */\n  .kpis{\n    display:grid;\n    grid-template-columns:repeat(4, 1fr);\n    gap:0;\n    border:1px solid var(--line);\n    border-radius:var(--radius);\n    background:var(--card);\n    overflow:hidden;\n    margin-bottom:36px;\n    box-shadow:var(--shadow);\n  }\n  .kpi{\n    padding:22px 24px 24px;\n    border-right:1px solid var(--line);\n    position:relative;\n  }\n  .kpi:last-child{border-right:0;}\n  .kpi-label{\n    font-size:11px;\n    font-weight:500;\n    text-transform:uppercase;\n    letter-spacing:0.14em;\n    color:var(--ink-4);\n    margin:0 0 14px;\n  }\n  .kpi-value{\n    font-family:'Inter Tight', sans-serif;\n    font-weight:600;\n    font-size:44px;\n    line-height:1;\n    letter-spacing:-0.04em;\n    color:var(--ink-1);\n    margin:0 0 8px;\n    display:flex;\n    align-items:baseline;\n    gap:8px;\n  }\n  .kpi-value sup{\n    font-family:'Instrument Serif', serif;\n    font-style:italic;\n    font-size:18px;\n    font-weight:400;\n    color:var(--ink-4);\n    top:-0.6em;\n    letter-spacing:0;\n  }\n  .kpi-sub{\n    font-size:12px;\n    color:var(--ink-4);\n    margin:0;\n    line-height:1.4;\n  }\n\n  /* ───────── section headers ───────── */\n  .section{\n    margin-top:48px;\n  }\n  .section:first-of-type{margin-top:0}\n  .section-head{\n    display:flex;\n    align-items:baseline;\n    justify-content:space-between;\n    gap:16px;\n    margin-bottom:16px;\n    padding-bottom:14px;\n    border-bottom:1px solid var(--line);\n  }\n  .section-num{\n    font-family:'Instrument Serif', serif;\n    font-style:italic;\n    font-size:14px;\n    color:var(--ink-4);\n  }\n  .section-title{\n    font-family:'Inter Tight', sans-serif;\n    font-weight:600;\n    font-size:22px;\n    letter-spacing:-0.02em;\n    color:var(--ink-1);\n    margin:0;\n    display:flex;\n    align-items:baseline;\n    gap:14px;\n  }\n  .section-desc{\n    font-size:13px;\n    color:var(--ink-4);\n    text-align:right;\n    max-width:42ch;\n  }\n\n  /* ───────── cards + grids ───────── */\n  .grid-2{\n    display:grid;\n    grid-template-columns:1fr 1fr;\n    gap:14px;\n    margin-bottom:14px;\n  }\n  .grid-3{\n    display:grid;\n    grid-template-columns:repeat(3,1fr);\n    gap:14px;\n    margin-bottom:14px;\n  }\n  .card{\n    background:var(--card);\n    border:1px solid var(--line);\n    border-radius:var(--radius);\n    padding:20px 22px;\n    box-shadow:var(--shadow);\n  }\n  .card-full{margin-bottom:14px;}\n\n  .card-head{\n    display:flex;\n    align-items:baseline;\n    justify-content:space-between;\n    gap:12px;\n    margin-bottom:14px;\n  }\n  .ctitle{\n    font-size:11px;\n    font-weight:500;\n    color:var(--ink-3);\n    margin:0;\n    text-transform:uppercase;\n    letter-spacing:0.14em;\n  }\n  .csub{\n    font-size:11px;\n    color:var(--ink-5);\n    margin:0;\n    font-family:'JetBrains Mono', monospace;\n  }\n\n  .legend{\n    display:flex;\n    flex-wrap:wrap;\n    gap:8px 16px;\n    margin-bottom:12px;\n    font-size:12px;\n    color:var(--ink-3);\n  }\n ems:flex-start}\n    .kpis{\n      grid-template-columns:1fr 1fr;\n    }\n    .kpi{\n      border-right:1px solid var(--line);\n      border-bottom:1px solid var(--line);\n    }\n    .kpi:nth-child(2n){border-right:0;}\n    .kpi:nth-last-child(-n+2){border-bottom:0;}\n    .kpi-value{font-size:34px;}\n    .grid-2, .grid-3{grid-template-columns:1fr;}\n    .stops{grid-template-columns:1fr;}\n    .section-head{flex-direction:column; align-items:flex-start; gap:8px;}\n    .section-desc{text-align:left;}\n    .repeat-row{\n      grid-template-columns: 24px 1fr auto;\n      grid-template-areas:\n        \"rank name count\"\n        \"rank bar  bar\";\n      row-gap:8px;\n      column-gap:14px;\n    }\n    .repeat-rank{grid-area:rank;}\n    .repeat-name{grid-area:name;}\n    .repeat-count{grid-area:count;}\n    .repeat-bar{grid-area:bar;}\n\n    .callout{grid-template-columns:1fr; gap:12px;}\n\n    /* table → cards */\n    .person-table{\n      border:0; background:transparent; box-shadow:none; border-radius:0;\n    }\n    .person-table thead{display:none;}\n    .person-table, .person-table tbody, .person-table tr, .person-table td{\n      display:block; width:100%;\n    }\n    .person-table tr{\n      background:var(--card);\n      border:1px solid var(--line);\n      border-radius:var(--radius);\n      padding:14px 16px;\n      margin-bottom:10px;\n      box-shadow:var(--shadow);\n    }\n    .person-table td{\n      padding:6px 0;\n      border:0;\n    }\n    .person-table td.who{\n      font-size:15px;\n      padding-bottom:10px;\n      margin-bottom:8px;\n      border-bottom:1px solid var(--line-2);\n      width:auto;\n    }\n    .person-table td:not(.who)::before{\n      content: attr(data-label);\n      display:block;\n      font-size:10px;\n      text-transform:uppercase;\n      letter-spacing:0.14em;\n      color:var(--ink-4);\n      font-weight:500;\n      margin-bottom:3px;\n    }\n  }\n  @media (max-width: 420px){\n    .kpi-value{font-size:30px;}\n    h1.title{fo
